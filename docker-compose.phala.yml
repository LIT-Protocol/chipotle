# Phala CVM deployment: lit-api-server + lit-actions + lit-static
# lit-actions and lit-api-server share gRPC Unix socket at /tmp/lit_actions.sock.
# lit-static serves SDKs, docs, dapps on port 8001.
# Uses tdx.large instance type via phala deploy --instance-type tdx.large

services:
  lit-actions:
    image: ${DOCKER_IMAGE_LIT_ACTIONS}
    command: ["lit_actions", "--socket", "/tmp/lit_actions.sock"]
    volumes:
      - lit-socket:/tmp
      - /var/run/dstack.sock:/var/run/dstack.sock
    restart: unless-stopped

  lit-api-server:
    image: ${DOCKER_IMAGE_LIT_API_SERVER}
    command: ["lit-api-server"]
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
    volumes:
      - lit-socket:/tmp
      - /var/run/dstack.sock:/var/run/dstack.sock
      # Uncomment to override NodeConfig.toml with production config (chain, contract_address, secret):
      # - ./NodeConfig.toml:/app/NodeConfig.toml:ro
    depends_on:
      - lit-actions
    restart: unless-stopped

  lit-static:
    image: ${DOCKER_IMAGE_LIT_STATIC}
    command: ["lit-static"]
    working_dir: /app
    ports:
      - "8001:8001"
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8001"
    restart: unless-stopped

volumes:
  lit-socket:
