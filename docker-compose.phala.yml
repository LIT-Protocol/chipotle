# Phala CVM deployment: lit-api-server + lit-actions + lit-static + otel-collector
# lit-actions and lit-api-server share gRPC Unix socket at /tmp/lit_actions.sock.
# lit-static serves SDKs, docs, dapps on port 8001.
# otel-collector runs as a sidecar that shares lit-api-server's network namespace,
# receives OTLP on localhost:4317, and forwards telemetry to GCP.
# Uses tdx.large instance type via phala deploy --instance-type tdx.large
#
# Image placeholders (DOCKER_IMAGE_*) are substituted with @sha256: digests by
# the deploy workflow (DR-1.1, DR-1.2) to ensure verifiable, immutable image
# references for CVM verification. Mutable tags (:latest, :sha) are never used
# in the deployed compose file.
#
# Required secrets (set as encrypted Phala CVM environment variables):
#   GCP_SERVICE_ACCOUNT_JSON  - GCP service account key (raw JSON or base64-encoded)
#   GCP_PROJECT_ID            - GCP project ID (e.g. "my-gcp-project")

services:
  lit-actions:
    image: ${DOCKER_IMAGE_LIT_ACTIONS}
    command: ["lit_actions", "--socket", "/tmp/lit_actions.sock"]
    volumes:
      - lit-socket:/tmp
    restart: unless-stopped

  lit-api-server:
    image: ${DOCKER_IMAGE_LIT_API_SERVER}
    command: ["lit-api-server"]
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      BASE_CHAIN_RPC: ${BASE_CHAIN_RPC}
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
    volumes:
      - lit-socket:/tmp
      - /var/run/dstack.sock:/var/run/dstack.sock
      # Uncomment to override NodeConfig.toml with production config (chain, contract_address, secret):
      # - ./NodeConfig.toml:/app/NodeConfig.toml:ro
    depends_on:
      - lit-actions
    restart: unless-stopped

  # OTel Collector sidecar — shares lit-api-server's network namespace so that
  # lit-api-server can reach the OTLP gRPC receiver on localhost:4317 without
  # any endpoint reconfiguration. Receives traces, metrics, and logs via OTLP
  # and exports them to GCP Cloud Monitoring, Cloud Trace, and Cloud Logging.
  #
  # NOTE: lit-api-server must be built with --features otlp for OTLP emission.
  # Without that feature, stdout logs are still captured by the container runtime.
  otel-collector:
    image: ${DOCKER_IMAGE_OTEL_COLLECTOR}
    network_mode: "service:lit-api-server"
    environment:
      # GCP_SERVICE_ACCOUNT_JSON and GCP_PROJECT_ID must be set as encrypted
      # Phala CVM secrets in the deployment manifest.
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    depends_on:
      - lit-api-server
    restart: unless-stopped

  lit-static:
    image: ${DOCKER_IMAGE_LIT_STATIC}
    command: ["lit-static"]
    working_dir: /app
    ports:
      - "8001:8001"
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8001"
    restart: unless-stopped

volumes:
  lit-socket:
