# Phala CVM deployment: lit-api-server + lit-actions
# Both services share a volume for the gRPC Unix socket at /tmp/lit_actions.sock.
# Uses smallest instance type (tdx.small) via phala deploy --instance-type tdx.small

services:
  lit-actions:
    image: ${DOCKER_IMAGE}
    command: ["lit_actions", "--socket", "/tmp/lit_actions.sock"]
    volumes:
      - lit-socket:/tmp
      - /var/run/dstack.sock:/var/run/dstack.sock
    restart: unless-stopped

  lit-api-server:
    image: ${DOCKER_IMAGE}
    command: ["lit-api-server"]
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
    volumes:
      - lit-socket:/tmp
      - /var/run/dstack.sock:/var/run/dstack.sock
    depends_on:
      - lit-actions
    restart: unless-stopped

volumes:
  lit-socket:
