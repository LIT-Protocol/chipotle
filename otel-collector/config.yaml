# OpenTelemetry Collector configuration for the lit-protocol Phala sidecar.
#
# Receives OTLP (gRPC) from lit-api-server and lit-actions on 0.0.0.0:4317,
# enriches spans/metrics/logs with lit-protocol resource attributes, and
# exports everything to GCP Cloud Monitoring, Cloud Trace, and Cloud Logging
# via the googlecloud exporter.
#
# Authentication: GOOGLE_APPLICATION_CREDENTIALS env var (set by entrypoint.sh
# from the GCP_SERVICE_ACCOUNT_JSON encrypted Phala secret).
#
# See: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/googlecloudexporter

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        # All interfaces so lit-api-server and lit-actions can both reach the
        # collector via the otel-collector hostname on the compose bridge network.
        endpoint: 0.0.0.0:4317

  # CVM host metrics — CPU, memory, disk I/O, network, and load averages.
  # root_path tells the receiver to read /proc and /sys from the host
  # bind-mounts rather than the container's own filesystem.
  # NOTE: the filesystem scraper (disk *space*) is omitted because it needs
  # statfs() on real mount points, which would require mounting the entire
  # host root filesystem into the container. The disk scraper still reports
  # I/O throughput via /proc/diskstats.
  hostmetrics:
    root_path: /host
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
        exclude:
          devices: ["loop.*", "fd.*", "sr.*"]
          match_type: regexp
      network:
      load:

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    send_batch_size: 512
    timeout: 5s

  # Stamp every signal with lit-protocol resource attributes.
  resource:
    attributes:
      - key: service.namespace
        value: lit-protocol
        action: upsert
      - key: cloud.provider
        value: gcp
        action: upsert

exporters:
  googlecloud:
    # GCP_PROJECT_ID is set in docker-compose.phala.yml (non-secret config).
    project: ${env:GCP_PROJECT_ID}

    log:
      # Default log name for signals that don't carry their own log name.
      default_log_name: lit-protocol/app

  # Internal collector health — visible in Cloud Logging under lit-protocol/otel-collector.
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: warn

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [googlecloud]

    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, resource, batch]
      exporters: [googlecloud]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [googlecloud, debug]
