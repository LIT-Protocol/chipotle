syntax = "proto3";

package com.litprotocol.actions;

service Action {
  rpc ExecuteJs(stream ExecuteJsRequest) returns (stream ExecuteJsResponse) {}
}

message ExecuteJsRequest {
  oneof union {
    ErrorResponse report_error = 255;
    ExecutionRequest execute = 1;
    SetResponseResponse set_response = 2;
    PrintResponse print = 3;
    IncrementFetchCountResponse increment_fetch_count = 4;
    UpdateResourceUsageResponse update_resource_usage = 5;
    AesEncryptResponse aes_encrypt = 10;
    AesDecryptResponse aes_decrypt = 11;
    GetPrivateKeyResponse get_private_key = 12;
    GetLitActionPrivateKeyResponse get_lit_action_private_key = 13;
    GetLitActionPublicKeyResponse get_lit_action_public_key = 14;
    GetLitActionWalletAddressResponse get_lit_action_wallet_address = 15;
  }

  message ExecutionRequest {
    string code = 1;
    optional bytes js_params = 2;      // Option<serde_json::Value>
    optional bytes auth_context = 3;   // Option<serde_json::Value>
    optional uint64 timeout = 4;       // milliseconds
    optional uint32 memory_limit = 5;  // megabytes
    map<string, string> http_headers = 6;
    optional string lit_action_private_key = 7; // Pre-fetched key to avoid gRPC round-trip
  }

  message ErrorResponse {
    string error = 1;
  }

  message SetResponseResponse {}

  message PrintResponse {}

  message IncrementFetchCountResponse {
    uint32 fetch_count = 1;
  }

  message UpdateResourceUsageResponse {
    bool cancel_action = 1;
  }

  message AesEncryptResponse {
    string ciphertext = 1; 
  }

  message AesDecryptResponse {
    string plaintext = 1;  // hex-encoded
  }
    
  message GetPrivateKeyResponse {
    string secret = 1;
  } 

  message GetLitActionPrivateKeyResponse {
    string secret = 1;
  }

  message GetLitActionPublicKeyResponse {
    string public_key = 1;
  }

  message GetLitActionWalletAddressResponse {
    string wallet_address = 1;
  }
}

message ExecuteJsResponse {
  oneof union {
    ExecutionResult result = 1;
    SetResponseRequest set_response = 2;
    PrintRequest print = 3;
    IncrementFetchCountRequest increment_fetch_count = 4;
    UpdateResourceUsageRequest update_resource_usage = 5;
    AesEncryptRequest aes_encrypt = 10;
    AesDecryptRequest aes_decrypt = 11;    
    GetPrivateKeyRequest get_private_key = 12;
    GetLitActionPrivateKeyRequest get_lit_action_private_key = 13;
    GetLitActionPublicKeyRequest get_lit_action_public_key = 14;
    GetLitActionWalletAddressRequest get_lit_action_wallet_address = 15;

  }

  message ExecutionResult {
    bool success = 1;
    string error = 2;
    string response = 3; // Response set by LitActions.setResponse(), avoids gRPC round-trip
    string logs = 4;     // Console output accumulated during execution
  }

  message SetResponseRequest {
    string response = 1;
  }

  message PrintRequest {
    string message = 1;
  }

  message UpdateResourceUsageRequest {
    uint32 tick = 1;
    uint32 used_kb = 2;
  }

  message IncrementFetchCountRequest {}

  message AesEncryptRequest {
    string pkp_id = 1;
    string message = 2;    
  }

  message AesDecryptRequest {
    string pkp_id = 1;
    string ciphertext = 2;
  }

  message GetPrivateKeyRequest {
    string pkp_id = 1;
  } 

  message GetLitActionPrivateKeyRequest {}

  message GetLitActionPublicKeyRequest {
    string ipfs_id = 1;
  }

  message GetLitActionWalletAddressRequest {
    string ipfs_id = 1;
  }
}
