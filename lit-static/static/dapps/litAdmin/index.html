<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lit Admin – AccountConfig contract</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f12;
        --card: #18181c;
        --border: #2a2a30;
        --text: #e4e4e7;
        --muted: #71717a;
        --accent: #a78bfa;
        --success: #34d399;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        max-width: 640px;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
      }
      .form-group input::placeholder {
        color: var(--muted);
      }
      button {
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 0.6rem 1.2rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      button:hover {
        opacity: 0.9;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .results {
        margin-top: 1.5rem;
      }
      .results h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--muted);
      }
      .result-row {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
      }
      .result-row:last-child {
        border-bottom: none;
      }
      .result-label {
        min-width: 180px;
        color: var(--muted);
      }
      .result-value {
        color: var(--text);
        word-break: break-all;
      }
      .result-value.empty {
        color: var(--muted);
      }
      .error {
        color: #f87171;
        font-size: 0.9rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Lit Admin</h1>
    <p class="subtitle">
      Read AccountConfig contract state (ABI from AccountConfig.json).
    </p>

    <div class="card">
      <div class="form-group">
        <label for="rpc-url">RPC URL</label>
        <input
          type="text"
          id="rpc-url"
          placeholder="https://sepolia.base.org"
          value="https://sepolia.base.org"
        />
      </div>
      <div class="form-group">
        <label for="contract-address">Contract address</label>
        <input
          type="text"
          id="contract-address"
          placeholder="0x..."
          value="0x76dba87c24eea6eb64bfa8deb646fb26e8a8837d"
        />
      </div>
      <button type="button" id="btn-fetch">Fetch</button>

      <div class="results" id="results" style="display: none">
        <h2>Contract values</h2>
        <div class="result-row">
          <span class="result-label">api_payer()</span
          ><span class="result-value" id="val-api-payer">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">pricing_operator()</span
          ><span class="result-value" id="val-pricing-operator">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">nextAccountCount</span
          ><span class="result-value" id="val-next-account-count">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">nextWalletCount</span
          ><span class="result-value" id="val-next-wallet-count">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">indexToAccountHashAt(1)</span
          ><span class="result-value" id="val-index-to-account">—</span>
        </div>
      </div>
      <div class="error" id="error" style="display: none"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
