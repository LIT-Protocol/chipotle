# Reusable workflow: wait for an API endpoint to become available
#
# Call with base_url (direct) or phala_app_name (get from Phala CLI):
#   uses: ./.github/workflows/wait-for-api.yml
#   with:
#     base_url: "https://example.com/core/v1"   # OR phala_app_name
#     # phala_app_name: "lit-api-server"        # CVM name; requires PHALA_CLOUD_API_KEY secret
#     # timeout: 300  # optional, seconds (default 300)
#     # runner: '["self-hosted"]'  # optional, JSON array for runs-on (default ubuntu-latest)
#   secrets:
#     PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}  # when using phala_app_name

name: Wait for API

on:
  workflow_call:
    outputs:
      base_url:
        description: "API base URL (e.g. https://example.com/core/v1)"
        value: ${{ jobs.wait.outputs.base_url }}
    inputs:
      base_url:
        description: "API base URL (e.g. https://example.com/core/v1); use when not using phala_app_name"
        required: false
        type: string
      phala_app_name:
        description: "Phala CVM name to get URL from (e.g. lit-api-server); requires PHALA_CLOUD_API_KEY secret"
        required: false
        type: string
      timeout:
        description: "Timeout in seconds"
        required: false
        type: number
        default: 300
      runner:
        description: 'Runner as JSON array (e.g. ["self-hosted"]), to match caller''s runner'
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      PHALA_CLOUD_API_KEY:
        description: "Phala Cloud API key (required when using phala_app_name)"
        required: false

jobs:
  wait:
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      base_url: ${{ steps.resolve-url.outputs.base_url }}
    steps:
      - name: Setup Node.js
        if: inputs.phala_app_name != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        if: inputs.phala_app_name != ''
        run: npm install -g phala

      - name: Resolve API base URL
        id: resolve-url
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          if [ -n "${{ inputs.phala_app_name }}" ]; then
            CVM_JSON=$(phala cvms get "${{ inputs.phala_app_name }}" --json)
            # Try multiple patterns: endpoints (prod), public_urls (Phala docs), prefer -8000. (app port)
            APP_URL=$(echo "$CVM_JSON" | jq -r '.endpoints[]? | select(.app != null and (.app | tostring | test("-8000\\."))) | .app' | head -1)
            if [ -z "$APP_URL" ]; then
              APP_URL=$(echo "$CVM_JSON" | jq -r '.public_urls[0].app // empty')
            fi
            if [ -z "$APP_URL" ]; then
              APP_URL=$(echo "$CVM_JSON" | jq -r '(.endpoints // [])[0].app // empty')
            fi
            if [ -z "$APP_URL" ]; then
              echo "Could not get public URL from phala cvms get"
              exit 1
            fi
            # Ensure https:// (lit-api-server-next uses dstack-pha-prod5.phala.network)
            case "$APP_URL" in http*) ;; *) APP_URL="https://$APP_URL" ;; esac
            BASE_URL="${APP_URL%/}/core/v1"
          elif [ -n "${{ inputs.base_url }}" ]; then
            BASE_URL="${{ inputs.base_url }}"
          else
            echo "Either base_url or phala_app_name must be provided"
            exit 1
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "API base URL: $BASE_URL"

      - name: Wait for API to become available
        run: |
          BASE_URL="${{ steps.resolve-url.outputs.base_url }}"
          TIMEOUT="${{ inputs.timeout }}"
          echo "Polling $BASE_URL/get_node_chain_config (timeout: ${TIMEOUT}s)..."
          deadline=$(( $(date +%s) + TIMEOUT ))
          until curl -sf "$BASE_URL/get_node_chain_config" > /dev/null; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "Timed out after ${TIMEOUT}s waiting for API"
              exit 1
            fi
            echo "Not ready, retrying in 10s..."
            sleep 10
          done
          sleep 15
          echo "API is up"
