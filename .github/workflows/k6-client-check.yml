# Fail if k6/litApiServer.ts has drifted from the OpenAPI spec generated by current sources.
# Regenerate with: cargo run --bin openapi_spec | npx @grafana/openapi-to-k6 /dev/stdin ./k6

name: k6 Client Check

on:
  push:
    branches: [main, next]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6-client-check:
    name: k6-client-check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Reset workspace to HEAD
        run: git checkout HEAD -- .

      - uses: dtolnay/rust-toolchain@1.91

      - name: Install protobuf-compiler
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update -qq && \
            sudo apt-get install -y protobuf-compiler && break
            echo "apt lock held, waiting 10s (attempt $i/5)..."
            sleep 10
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate OpenAPI spec from sources
        working-directory: lit-api-server
        run: cargo run --bin openapi_spec > "${{ runner.temp }}/openapi-from-source.json"

      - name: Generate k6 client from spec
        run: |
          npm install @grafana/openapi-to-k6
          npx openapi-to-k6 --verbose "${{ runner.temp }}/openapi-from-source.json" "${{ runner.temp }}/k6-generated"

      - name: Compare with committed litApiServer.ts
        run: |
          if ! diff -q "${{ runner.temp }}/k6-generated/litApiServer.ts" ./k6/litApiServer.ts; then
            echo "::error::k6/litApiServer.ts is out of date. Run 'npx @grafana/openapi-to-k6' to regenerate it from the current OpenAPI spec."
            echo ""
            echo "To fix, run from the repo root:"
            echo "  cd lit-api-server && cargo run --bin openapi_spec > spec.json"
            echo "  npx @grafana/openapi-to-k6 spec.json ./k6"
            echo ""
            diff "${{ runner.temp }}/k6-generated/litApiServer.ts" ./k6/litApiServer.ts || true
            exit 1
          fi
          echo "k6/litApiServer.ts is up to date with sources"
