# Deploy lit-api-server + lit-actions + lit-static + otel-collector to Phala CVM (tdx.large instance)
#
# Branch-based deployment:
#   push to main            → chipotle-dev
#   push to next or others  → chipotle-next
#
# Image provenance (DR-1b): Each image is signed with Sigstore (cosign keyless) immediately
# after push. Signatures are recorded in the public Rekor transparency log, binding the image
# digest to the GitHub Actions OIDC identity that built it. This allows anyone to verify that
# a given image digest was built from a specific commit in this repository.
#
# To verify an image:
#   cosign verify \
#     --certificate-identity-regexp "https://github.com/LIT-Protocol/lit-node-express/.*" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     <image>@<digest>
#
# Required secrets:
#   DOCKERHUB_TOKEN - Docker Hub PAT (Account Settings > Security > Access Tokens)
#   PHALA_CLOUD_API_KEY - From Phala Cloud Dashboard > API Tokens
#   SAFE_PROPOSER_PRIVATE_KEY - Private key for proposing Safe transactions
#
# Required vars:
#   DOCKER_IMAGE - Base image path, e.g. docker.io/username/lit-node-express
#                  Four images are pushed:
#                    ${DOCKER_IMAGE}-lit-actions
#                    ${DOCKER_IMAGE}-lit-api-server
#                    ${DOCKER_IMAGE}-lit-static
#                    ${DOCKER_IMAGE}-otel-collector
#   DOCKERHUB_USERNAME - Docker Hub username
#   SAFE_ADDRESS_CHIPOTLE_DEV - Safe multisig address for chipotle-dev
#   SAFE_ADDRESS_CHIPOTLE_NEXT - Safe multisig address for chipotle-next
#   APP_AUTH_ADDRESS_CHIPOTLE_DEV - AppAuth contract address for chipotle-dev
#   APP_AUTH_ADDRESS_CHIPOTLE_NEXT - AppAuth contract address for chipotle-next

name: Deploy to Phala CVM

# Only one deploy job per-branch: abort any running job on same branch when a new commit is pushed.
concurrency:
  group: deploy-phala-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}  # branch name (ref_name) or PR head (head_ref)
  cancel-in-progress: true

on:
  push:
    branches: [main, next]

jobs:
  determine-target:
    runs-on: self-hosted
    outputs:
      phala_app_name: ${{ steps.set.outputs.phala_app_name }}
      base_url: ${{ steps.set.outputs.base_url }}
      api_root_url: ${{ steps.set.outputs.api_root_url }}
      instance_type: ${{ steps.set.outputs.instance_type }}
      gcp_project_id: ${{ steps.set.outputs.gcp_project_id }}
      node_config: ${{ steps.set.outputs.node_config }}
      safe_address: ${{ steps.set.outputs.safe_address }}
      app_auth_address: ${{ steps.set.outputs.app_auth_address }}
    steps:
      - name: Set deployment target
        id: set
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "phala_app_name=chipotle-dev" >> "$GITHUB_OUTPUT"
            echo "instance_type=tdx.large" >> "$GITHUB_OUTPUT"
            echo "gcp_project_id=chipotle-dev" >> "$GITHUB_OUTPUT"
            echo "node_config=NodeConfig.main.toml" >> "$GITHUB_OUTPUT"
            echo "safe_address=${{ vars.SAFE_ADDRESS_CHIPOTLE_DEV }}" >> "$GITHUB_OUTPUT"
            echo "app_auth_address=${{ vars.APP_AUTH_ADDRESS_CHIPOTLE_DEV }}" >> "$GITHUB_OUTPUT"
            BASE_URL="https://f8fce543471dc9f5f5643aa217422398c36e5edc-8000.dstack-base-prod5.phala.network"
          elif [ "${{ github.ref }}" = "refs/heads/next" ]; then
            echo "phala_app_name=chipotle-next" >> "$GITHUB_OUTPUT"
            echo "instance_type=tdx.small" >> "$GITHUB_OUTPUT"
            echo "gcp_project_id=chipotle-next" >> "$GITHUB_OUTPUT"
            echo "node_config=NodeConfig.next.toml" >> "$GITHUB_OUTPUT"
            echo "safe_address=${{ vars.SAFE_ADDRESS_CHIPOTLE_NEXT }}" >> "$GITHUB_OUTPUT"
            echo "app_auth_address=${{ vars.APP_AUTH_ADDRESS_CHIPOTLE_NEXT }}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch for deployment"
            exit 1
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "api_root_url=${BASE_URL}/core/v1" >> "$GITHUB_OUTPUT"

  build:
    needs: [determine-target]
    runs-on: self-hosted
    permissions:
      id-token: write  # required for Sigstore keyless signing (OIDC token)
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: lit-actions
            dockerfile: Dockerfile.lit-actions
          - service: lit-api-server
            dockerfile: Dockerfile.lit-api-server
          - service: lit-static
            dockerfile: Dockerfile.lit-static
          - service: otel-collector
            dockerfile: Dockerfile.otel-collector
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ vars.DOCKER_IMAGE }}-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'lit-static' && format('BASE_URL={0}', needs.determine-target.outputs.base_url) || '' }}
            ${{ matrix.service == 'lit-api-server' && format('NODE_CONFIG={0}', needs.determine-target.outputs.node_config) || '' }}

      - name: Sign image with Sigstore (keyless)
        run: |
          cosign sign --yes \
            "${{ vars.DOCKER_IMAGE }}-${{ matrix.service }}@${{ steps.push.outputs.digest }}"

      - name: Save image digest
        run: echo "${{ steps.push.outputs.digest }}" > digest-${{ matrix.service }}.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}
          path: digest-${{ matrix.service }}.txt

  # Phase 1: Prepare the deployment and get the compose hash from the Phala API.
  # This does NOT deploy — it returns a commit token for Phase 2.
  prepare-deploy:
    needs: [determine-target, build]
    runs-on: self-hosted
    outputs:
      compose_hash: ${{ steps.prepare.outputs.compose_hash }}
      commit_token: ${{ steps.prepare.outputs.commit_token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Prepare docker-compose for deployment (digest-pinned)
        run: |
          DIGEST_LIT_ACTIONS=$(cat digest-lit-actions.txt | tr -d '\n' | sed 's/}[}]*$//')
          DIGEST_LIT_API_SERVER=$(cat digest-lit-api-server.txt | tr -d '\n' | sed 's/}[}]*$//')
          DIGEST_LIT_STATIC=$(cat digest-lit-static.txt | tr -d '\n' | sed 's/}[}]*$//')
          DIGEST_OTEL_COLLECTOR=$(cat digest-otel-collector.txt | tr -d '\n' | sed 's/}[}]*$//')
          sed \
            -e "s|\${DOCKER_IMAGE_LIT_ACTIONS}|${{ vars.DOCKER_IMAGE }}-lit-actions@${DIGEST_LIT_ACTIONS}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_API_SERVER}|${{ vars.DOCKER_IMAGE }}-lit-api-server@${DIGEST_LIT_API_SERVER}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_STATIC}|${{ vars.DOCKER_IMAGE }}-lit-static@${DIGEST_LIT_STATIC}|g" \
            -e "s|\${DOCKER_IMAGE_OTEL_COLLECTOR}|${{ vars.DOCKER_IMAGE }}-otel-collector@${DIGEST_OTEL_COLLECTOR}|g" \
            -e "s|\${GCP_PROJECT_ID}|${{ needs.determine-target.outputs.gcp_project_id }}|g" \
            docker-compose.phala.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Prepare deployment (get compose hash + commit token)
        id: prepare
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          OUTPUT=$(phala deploy \
            --prepare-only \
            -c docker-compose.deploy.yml \
            --cvm-id ${{ needs.determine-target.outputs.phala_app_name }} \
            --json)
          echo "$OUTPUT"
          COMPOSE_HASH=$(echo "$OUTPUT" | jq -r '.compose_hash')
          COMMIT_TOKEN=$(echo "$OUTPUT" | jq -r '.commit_token')
          if [ -z "$COMPOSE_HASH" ] || [ "$COMPOSE_HASH" = "null" ]; then
            echo "::error::Failed to extract compose_hash from phala deploy --prepare-only output"
            exit 1
          fi
          if [ -z "$COMMIT_TOKEN" ] || [ "$COMMIT_TOKEN" = "null" ]; then
            echo "::error::Failed to extract commit_token from phala deploy --prepare-only output"
            exit 1
          fi
          echo "compose_hash=$COMPOSE_HASH" >> "$GITHUB_OUTPUT"
          echo "commit_token=$COMMIT_TOKEN" >> "$GITHUB_OUTPUT"

  # Propose addComposeHash to Safe multisig for approval by signers.
  propose-compose-hash:
    needs: [determine-target, prepare-deploy]
    runs-on: self-hosted
    outputs:
      safe_tx_hash: ${{ steps.propose.outputs.safe_tx_hash }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install contract dependencies
        working-directory: lit-api-server/blockchain/lit_node_express
        run: npm ci

      - name: Compile contracts
        working-directory: lit-api-server/blockchain/lit_node_express
        run: npx hardhat compile

      - name: Propose addComposeHash to Safe
        id: propose
        working-directory: lit-api-server/blockchain/lit_node_express
        env:
          PROPOSER_PRIVATE_KEY: ${{ secrets.SAFE_PROPOSER_PRIVATE_KEY }}
        run: |
          OUTPUT=$(npx hardhat propose-dstack-app \
            --network base \
            --safe "${{ needs.determine-target.outputs.safe_address }}" \
            --app-auth "${{ needs.determine-target.outputs.app_auth_address }}" \
            --compose-hash "${{ needs.prepare-deploy.outputs.compose_hash }}" \
            2>&1 | tee /dev/stderr)
          SAFE_TX_HASH=$(echo "$OUTPUT" | grep '^SAFE_TX_HASH=' | cut -d= -f2)
          if [ -z "$SAFE_TX_HASH" ]; then
            echo "::error::Failed to extract SAFE_TX_HASH from propose-dstack-app output"
            exit 1
          fi
          echo "safe_tx_hash=$SAFE_TX_HASH" >> "$GITHUB_OUTPUT"

  # Upload deployment context as artifact for the Phase 2 workflow.
  upload-deploy-context:
    needs: [determine-target, prepare-deploy, propose-compose-hash]
    runs-on: self-hosted
    steps:
      - name: Create deployment context file
        run: |
          jq -n \
            --arg compose_hash "${{ needs.prepare-deploy.outputs.compose_hash }}" \
            --arg commit_token "${{ needs.prepare-deploy.outputs.commit_token }}" \
            --arg safe_tx_hash "${{ needs.propose-compose-hash.outputs.safe_tx_hash }}" \
            --arg phala_app_name "${{ needs.determine-target.outputs.phala_app_name }}" \
            --arg base_url "${{ needs.determine-target.outputs.base_url }}" \
            --arg api_root_url "${{ needs.determine-target.outputs.api_root_url }}" \
            --arg safe_address "${{ needs.determine-target.outputs.safe_address }}" \
            --arg source_sha "${{ github.sha }}" \
            '{compose_hash: $compose_hash, commit_token: $commit_token, safe_tx_hash: $safe_tx_hash, phala_app_name: $phala_app_name, base_url: $base_url, api_root_url: $api_root_url, safe_address: $safe_address, source_sha: $source_sha}' \
            > deploy-context.json
          echo "Deployment context:"
          cat deploy-context.json

      - name: Upload deployment context
        uses: actions/upload-artifact@v4
        with:
          name: deploy-context
          path: deploy-context.json
          retention-days: 7
