# Deploy lit-api-server + lit-actions + lit-static to Phala CVM (tdx.large instance)
#
# Branch-based deployment:
#   push to main  → lit-api-server,      base_url https://api.dev.litprotocol.com
#   push to next  → lit-api-server-next, base_url https://...-8000.dstack-pha-prod5.phala.network
#
# Required secrets:
#   DOCKERHUB_TOKEN - Docker Hub PAT (Account Settings > Security > Access Tokens)
#   PHALA_CLOUD_API_KEY - From Phala Cloud Dashboard > API Tokens
#
# Required vars:
#   DOCKER_IMAGE - Base image path, e.g. docker.io/username/lit-node-express
#                  Three images are pushed:
#                    ${DOCKER_IMAGE}-lit-actions
#                    ${DOCKER_IMAGE}-lit-api-server
#                    ${DOCKER_IMAGE}-lit-static
#   DOCKERHUB_USERNAME - Docker Hub username

name: Deploy to Phala CVM

# Only one deploy job per-branch: abort any running job on same branch when a new commit is pushed.
concurrency:
  group: deploy-phala-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}  # branch name (ref_name) or PR head (head_ref)
  cancel-in-progress: true

on:
  push:
    branches: [main, next]

jobs:
  determine-target:
    runs-on: ubuntu-latest
    outputs:
      phala_app_name: ${{ steps.set.outputs.phala_app_name }}
      base_url: ${{ steps.set.outputs.base_url }}
      api_root_url: ${{ steps.set.outputs.api_root_url }}
    steps:
      - name: Set deployment target
        id: set
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "phala_app_name=lit-api-server" >> "$GITHUB_OUTPUT"
            BASE_URL="https://api.dev.litprotocol.com"
          elif [ "${{ github.ref }}" = "refs/heads/next" ]; then
            echo "phala_app_name=lit-api-server-next" >> "$GITHUB_OUTPUT"
            BASE_URL="https://e364da71b0c9af3b9068daa6321edd6ee932aa89-8000.dstack-pha-prod5.phala.network"
          else
            echo "Unsupported branch for deployment"
            exit 1
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "api_root_url=${BASE_URL}/core/v1" >> "$GITHUB_OUTPUT"

  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine runner (self-hosted or fallback)
        id: set-runner
        uses: mikehardy/runner-fallback-action@v1
        with:
          primary-runner: self-hosted
          fallback-runner: ubuntu-latest
          github-token: ${{ secrets.GH_RUNNER_CHECK_TOKEN }}
          fallback-on-error: true

  build:
    needs: [determine-runner, determine-target]
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: lit-actions
            dockerfile: Dockerfile.lit-actions
          - service: lit-api-server
            dockerfile: Dockerfile.lit-api-server
          - service: lit-static
            dockerfile: Dockerfile.lit-static
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ vars.DOCKER_IMAGE }}-${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.service == 'lit-static' && format('BASE_URL={0}', needs.determine-target.outputs.base_url) || '' }}

      - name: Save image digest
        run: echo "${{ steps.push.outputs.digest }}" > digest-${{ matrix.service }}.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}
          path: digest-${{ matrix.service }}.txt

  deploy:
    needs: [determine-runner, determine-target, build]
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Prepare docker-compose for deployment (digest-pinned)
        run: |
          DIGEST_LIT_ACTIONS=$(cat digest-lit-actions.txt)
          DIGEST_LIT_API_SERVER=$(cat digest-lit-api-server.txt)
          DIGEST_LIT_STATIC=$(cat digest-lit-static.txt)
          sed \
            -e "s|\${DOCKER_IMAGE_LIT_ACTIONS}|${{ vars.DOCKER_IMAGE }}-lit-actions@${DIGEST_LIT_ACTIONS}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_API_SERVER}|${{ vars.DOCKER_IMAGE }}-lit-api-server@${DIGEST_LIT_API_SERVER}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_STATIC}|${{ vars.DOCKER_IMAGE }}-lit-static@${DIGEST_LIT_STATIC}|g" \
            docker-compose.phala.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Deploy to Phala Cloud (tdx.large CVM)
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            -c docker-compose.deploy.yml \
            --cvm-id ${{ needs.determine-target.outputs.phala_app_name }} \
            --instance-type tdx.large

  # Give the Phala CLI time to trigger the CVM restart and begin rebooting.
  # Without this, the old instance may still be serving the API when wait-for-api-available
  # starts polling, so we'd pass before the new deployment is actually live.
  wait-after-deploy:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait after Phala deploy
        run: sleep 30

  wait-for-api-available:
    needs: [wait-after-deploy, determine-runner, determine-target]
    uses: ./.github/workflows/wait-for-api.yml
    with:
      api_root_url: ${{ needs.determine-target.outputs.api_root_url }}
      runner: ${{ needs.determine-runner.outputs.runner }}

  openapi-spec-check:
    needs: [wait-for-api-available, determine-runner]
    uses: ./.github/workflows/openapi-spec-check.yml
    with:
      api_root_url: ${{ needs.wait-for-api-available.outputs.api_root_url }}
      runner: ${{ needs.determine-runner.outputs.runner }}

  k6-smoke:
    needs: [wait-for-api-available, openapi-spec-check]
    uses: ./.github/workflows/k6-smoke.yml
    with:
      api_root_url: ${{ needs.wait-for-api-available.outputs.api_root_url }}

  k6-integration:
    needs: [wait-for-api-available, k6-smoke]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-integration.yml
    with:
      api_root_url: ${{ needs.wait-for-api-available.outputs.api_root_url }}

  k6-new-account:
    needs: [wait-for-api-available, k6-integration]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-new-account.yml
    with:
      api_root_url: ${{ needs.wait-for-api-available.outputs.api_root_url }}

  k6-lit-action-ecdsa-sign:
    needs: [wait-for-api-available, k6-new-account]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-lit-action-ecdsa-sign.yml
    with:
      api_root_url: ${{ needs.wait-for-api-available.outputs.api_root_url }}

