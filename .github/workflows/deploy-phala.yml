# Deploy lit-api-server + lit-actions + lit-static to Phala CVM (tdx.large instance)
#
# Branch-based deployment:
#   push to main  → lit-api-server, BASE_URL https://api.dev.litprotocol.com/core/v1
#   push to next  → lit-api-server-next, BASE_URL https://...-8000.dstack-pha-prod5.phala.network/core/v1
#   manual run    → user selects target (lit-api-server or lit-api-server-next)
#
# Required secrets:
#   DOCKERHUB_TOKEN - Docker Hub PAT (Account Settings > Security > Access Tokens)
#   PHALA_CLOUD_API_KEY - From Phala Cloud Dashboard > API Tokens
#
# Required vars:
#   DOCKER_IMAGE - Base image path, e.g. docker.io/username/lit-node-express
#                  Three images are pushed:
#                    ${DOCKER_IMAGE}-lit-actions
#                    ${DOCKER_IMAGE}-lit-api-server
#                    ${DOCKER_IMAGE}-lit-static
#   DOCKERHUB_USERNAME - Docker Hub username

name: Deploy to Phala CVM

# checkov:skip=CKV_GHA_7:Manual deployment target selection requires workflow_dispatch inputs
on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Deployment target (CVM name)
        required: true
        type: choice
        options:
          - lit-api-server
          - lit-api-server-next
        default: lit-api-server-next

jobs:
  determine-target:
    runs-on: ubuntu-latest
    outputs:
      phala_app_name: ${{ steps.set.outputs.phala_app_name }}
      base_url: ${{ steps.set.outputs.base_url }}
    steps:
      - name: Set deployment target and base URL
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.deployment_target }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="lit-api-server"
          elif [ "${{ github.ref }}" = "refs/heads/next" ]; then
            TARGET="lit-api-server-next"
          else
            echo "Unsupported branch for deployment"
            exit 1
          fi
          echo "phala_app_name=$TARGET" >> "$GITHUB_OUTPUT"
          if [ "$TARGET" = "lit-api-server" ]; then
            echo "base_url=https://api.dev.litprotocol.com/core/v1" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://e364da71b0c9af3b9068daa6321edd6ee932aa89-8000.dstack-pha-prod5.phala.network/core/v1" >> "$GITHUB_OUTPUT"
          fi

  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine runner (self-hosted or fallback)
        id: set-runner
        uses: mikehardy/runner-fallback-action@v1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.GH_RUNNER_CHECK_TOKEN }}
          fallback-on-error: true

  build:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: lit-actions
            dockerfile: Dockerfile.lit-actions
          - service: lit-api-server
            dockerfile: Dockerfile.lit-api-server
          - service: lit-static
            dockerfile: Dockerfile.lit-static
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE }}-${{ matrix.service }}:${{ github.sha }}
            ${{ vars.DOCKER_IMAGE }}-${{ matrix.service }}:latest

  deploy:
    needs: [determine-runner, determine-target, build]
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare docker-compose for deployment
        run: |
          TAG="${{ github.sha }}"
          sed \
            -e "s|\${DOCKER_IMAGE_LIT_ACTIONS}|${{ vars.DOCKER_IMAGE }}-lit-actions:${TAG}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_API_SERVER}|${{ vars.DOCKER_IMAGE }}-lit-api-server:${TAG}|g" \
            -e "s|\${DOCKER_IMAGE_LIT_STATIC}|${{ vars.DOCKER_IMAGE }}-lit-static:${TAG}|g" \
            docker-compose.phala.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Deploy to Phala Cloud (tdx.large CVM)
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            -c docker-compose.deploy.yml \
            --cvm-id ${{ needs.determine-target.outputs.phala_app_name }} \
            --instance-type tdx.large

  # Give the Phala CLI time to trigger the CVM restart and begin rebooting.
  # Without this, the old instance may still be serving the API when wait-for-api-available
  # starts polling, so we'd pass before the new deployment is actually live.
  wait-after-deploy:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait after Phala deploy
        run: sleep 30

  wait-for-api-available:
    needs: [wait-after-deploy, determine-runner, determine-target]
    uses: ./.github/workflows/wait-for-api.yml
    with:
      base_url: ${{ needs.determine-target.outputs.base_url }}
      runner: ${{ needs.determine-runner.outputs.runner }}

  openapi-spec-check:
    needs: [wait-for-api-available, determine-runner]
    uses: ./.github/workflows/openapi-spec-check.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}
      runner: ${{ needs.determine-runner.outputs.runner }}

  k6-smoke:
    needs: [wait-for-api-available, openapi-spec-check]
    uses: ./.github/workflows/k6-smoke.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}

  k6-integration:
    needs: [wait-for-api-available, k6-smoke]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-integration.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}

  k6-new-account:
    needs: [wait-for-api-available, k6-integration]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-new-account.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}

  k6-lit-action-get-public-key:
    needs: [wait-for-api-available, k6-new-account]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-lit-action-get-public-key.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}

  k6-lit-action-sign-as-action:
    needs: [wait-for-api-available, k6-lit-action-get-public-key]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-lit-action-sign-as-action.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}

  k6-lit-action-verify-action-signature:
    needs: [wait-for-api-available, k6-lit-action-sign-as-action]
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/k6-lit-action-verify-action-signature.yml
    with:
      base_url: ${{ needs.wait-for-api-available.outputs.base_url }}
