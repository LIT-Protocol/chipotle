# Deploy lit-api-server + lit-actions to Phala CVM (smallest instance)
#
# Required secrets:
#   DOCKERHUB_USERNAME - Docker Hub username
#   DOCKERHUB_TOKEN - Docker Hub PAT (Account Settings > Security > Access Tokens)
#   PHALA_CLOUD_API_KEY - From Phala Cloud Dashboard > API Tokens
#
# Required vars:
#   DOCKER_IMAGE - Full image path, e.g. docker.io/username/lit-node-express
#   PHALA_APP_NAME - CVM name, e.g. lit-api-server

name: Deploy to Phala CVM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine runner (self-hosted or fallback)
        id: set-runner
        uses: mikehardy/runner-fallback-action@v1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.GH_RUNNER_CHECK_TOKEN }}
          fallback-on-error: true

  deploy:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate deploy tag (commit hash)
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.phala
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ vars.DOCKER_IMAGE }}:latest

      - name: Prepare docker-compose for deployment
        run: |
          IMAGE="${{ vars.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}"
          sed "s|\${DOCKER_IMAGE}|${IMAGE}|g" docker-compose.phala.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Deploy to Phala Cloud (smallest CVM)
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            -c docker-compose.deploy.yml \
            --cvm-id ${{ vars.PHALA_APP_NAME }} \
            --instance-type tdx.small

  wait-for-api:
    needs: [deploy, determine-runner]
    uses: ./.github/workflows/wait-for-api.yml
    with:
      phala_app_name: ${{ vars.PHALA_APP_NAME }}
      runner: ${{ needs.determine-runner.outputs.runner }}
    secrets:
      PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
