# Reusable workflow: wait for an API deployment to complete
#
# Polls the /version endpoint until commit_version matches the expected SHA,
# then confirms /health is OK.
#
# Call with api_root_url (direct) or phala_app_name (get from Phala CLI):
#   uses: ./.github/workflows/wait-for-api-restart.yml
#   with:
#     expected_sha: ${{ github.sha }}
#     api_root_url: "https://example.com/core/v1"   # OR phala_app_name
#     # phala_app_name: "lit-api-server"        # CVM name; requires PHALA_CLOUD_API_KEY secret
#     # timeout: 600  # optional, seconds (default 600)
#     # runner: '["self-hosted"]'  # optional, JSON array for runs-on (default self-hosted)
#   secrets:
#     PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}  # when using phala_app_name

name: Wait for API restart

permissions:
  contents: read

on:
  workflow_call:
    outputs:
      api_root_url:
        description: "API base URL (e.g. https://example.com/core/v1)"
        value: ${{ jobs.wait.outputs.api_root_url }}
    inputs:
      expected_sha:
        description: "Expected git commit SHA for the new deployment"
        required: true
        type: string
      api_root_url:
        description: "API base URL (e.g. https://example.com/core/v1); use when not using phala_app_name"
        required: false
        type: string
      phala_app_name:
        description: "Phala CVM name to get URL from (e.g. lit-api-server); requires PHALA_CLOUD_API_KEY secret"
        required: false
        type: string
      timeout:
        description: "Timeout in seconds"
        required: false
        type: number
        default: 600
      runner:
        description: 'Runner as JSON array (e.g. ["self-hosted"]), to match caller''s runner'
        required: false
        type: string
        default: '["self-hosted"]'
    secrets:
      PHALA_CLOUD_API_KEY:
        description: "Phala Cloud API key (required when using phala_app_name)"
        required: false

jobs:
  wait:
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      api_root_url: ${{ steps.resolve-url.outputs.api_root_url }}
    steps:
      - name: Setup Node.js
        if: inputs.phala_app_name != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        if: inputs.phala_app_name != ''
        run: npm install -g phala

      - name: Resolve API base URL
        id: resolve-url
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          if [ -n "${{ inputs.phala_app_name }}" ]; then
            CVM_JSON=$(phala cvms get "${{ inputs.phala_app_name }}" --json)
            # Try multiple patterns: endpoints (prod), public_urls (Phala docs), prefer -8000. (app port)
            APP_URL=$(echo "$CVM_JSON" | jq -r '.endpoints[]? | select(.app != null and (.app | tostring | test("-8000\\."))) | .app' | head -1)
            if [ -z "$APP_URL" ]; then
              APP_URL=$(echo "$CVM_JSON" | jq -r '.public_urls[0].app // empty')
            fi
            if [ -z "$APP_URL" ]; then
              APP_URL=$(echo "$CVM_JSON" | jq -r '(.endpoints // [])[0].app // empty')
            fi
            if [ -z "$APP_URL" ]; then
              echo "Could not get public URL from phala cvms get"
              exit 1
            fi
            # Ensure https:// (lit-api-server-next uses dstack-pha-prod5.phala.network)
            case "$APP_URL" in http*) ;; *) APP_URL="https://$APP_URL" ;; esac
            BASE_URL="${APP_URL%/}/core/v1"
          elif [ -n "${{ inputs.api_root_url }}" ]; then
            BASE_URL="${{ inputs.api_root_url }}"
          else
            echo "Either api_root_url or phala_app_name must be provided"
            exit 1
          fi
          echo "api_root_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "API base URL: $BASE_URL"

      - name: Wait for expected version and health
        run: |
          BASE_URL="${{ steps.resolve-url.outputs.api_root_url }}"
          TIMEOUT="${{ inputs.timeout }}"
          EXPECTED_SHA="${{ inputs.expected_sha }}"
          VERSION_URL="${BASE_URL}/version"
          HEALTH_URL="${BASE_URL%/core/v1}/health"

          echo "Polling $VERSION_URL for commit_version == $EXPECTED_SHA (timeout: ${TIMEOUT}s)..."
          deadline=$(( $(date +%s) + TIMEOUT ))

          while true; do
            CURRENT_SHA=$(curl -sf "$VERSION_URL" 2>/dev/null | jq -r '.commit_version // empty' 2>/dev/null || true)
            if [ "$CURRENT_SHA" = "$EXPECTED_SHA" ]; then
              echo "Version matched: $CURRENT_SHA"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out after ${TIMEOUT}s waiting for version $EXPECTED_SHA (last seen: ${CURRENT_SHA:-<unavailable>})"
              exit 1
            fi
            echo "Current version: ${CURRENT_SHA:-<unavailable>}, waiting 10s..."
            sleep 10
          done

          # Confirm health endpoint is OK
          echo "Version matched — confirming $HEALTH_URL is healthy..."
          until curl -sf "$HEALTH_URL" > /dev/null; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Version matched but health check failed within timeout"
              exit 1
            fi
            echo "Health not ready, retrying in 5s..."
            sleep 5
          done
          echo "API is up and healthy"
