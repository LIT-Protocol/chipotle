# Nightly maintenance on every self-hosted runner in the org:
#   1. Scan for Rust crate workspaces and run `cargo clean`
#   2. Run `docker system prune -f` to remove unused Docker objects
#
# Runs at 3:00 AM Pacific Standard Time (11:00 UTC).  During Pacific Daylight
# Time (summer) this fires at 4:00 AM PT instead; adjust the cron to `0 10`
# if strict PDT alignment is needed.
#
# Prerequisites
# ─────────────
# • A repository secret named GH_ORG_ADMIN_TOKEN must exist.
#   The token needs the `manage_runners:org` (or `admin:org`) scope so that
#   the first job can call GET /orgs/{org}/actions/runners.
# • Runners are targeted via their `hostname:<host>` + `username:<user>` labels
#   (e.g. hostname:ovh-staging-4 + username:runner-0), which vbem/multi-runners
#   registers automatically.  Each cleanup job is pinned to a specific machine
#   using runs-on: [self-hosted, "hostname:…", "username:…"].

name: Nightly Runner Cleanup

on:
  schedule:
    - cron: "0 11 * * *"   # 03:00 PST / 04:00 PDT
  workflow_dispatch:        # manual trigger for testing

jobs:
  # ── 1. Enumerate every self-hosted runner in the org ─────────────────────
  list-runners:
    name: List self-hosted runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.runners.outputs.matrix }}

    steps:
      - name: Query org runners via GitHub API
        id: runners
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_ADMIN_TOKEN }}
        run: |
          # Build a matrix of {name, hostname, username} objects — one per runner.
          # hostname:… and username:… labels are auto-applied by vbem/multi-runners
          # and together uniquely identify a single runner process on a machine.
          matrix=$(gh api \
            "/orgs/${{ github.repository_owner }}/actions/runners" \
            --paginate \
            --jq '[.runners[] | {
              name: .name,
              hostname: (.labels[] | select(.name | startswith("hostname:")) | .name),
              username: (.labels[] | select(.name | startswith("username:")) | .name)
            }]')

          echo "Discovered runners: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── 2. Run cleanup tasks on each runner in parallel ──────────────────────
  cargo-clean:
    name: "cleanup @ ${{ matrix.runner.name }}"
    needs: list-runners
    if: ${{ needs.list-runners.outputs.matrix != '[]' && needs.list-runners.outputs.matrix != '' }}

    strategy:
      fail-fast: false          # keep cleaning other runners even if one fails
      matrix:
        runner: ${{ fromJson(needs.list-runners.outputs.matrix) }}

    # hostname:… + username:… uniquely identify one runner process on one machine.
    runs-on: ["self-hosted", "${{ matrix.runner.hostname }}", "${{ matrix.runner.username }}"]

    steps:
      - name: cargo clean
        shell: bash
        run: |
          set -euo pipefail

          echo "═══════════════════════════════════════"
          echo "Runner : $RUNNER_NAME"
          echo "Host   : $(hostname)"
          echo "═══════════════════════════════════════"

          # RUNNER_WORKSPACE is set by the Actions agent to the repo-specific
          # subdirectory inside _work (e.g. /opt/runner/_work/my-repo/my-repo).
          # Going up two levels gives us the root _work directory that contains
          # all checked-out repositories for this runner.
          if [[ -z "${RUNNER_WORKSPACE:-}" ]]; then
            echo "RUNNER_WORKSPACE is not set; cannot determine work root." >&2
            exit 1
          fi

          work_root="${RUNNER_WORKSPACE%/*/*}"   # strip /<repo>/<repo>  →  _work
          # Fallback: if the double-strip collapsed too far, use single strip.
          if [[ ! -d "$work_root" ]]; then
            work_root="${RUNNER_WORKSPACE%/*}"
          fi

          echo "Work root: $work_root"
          echo ""

          found=0
          cleaned=0
          failed=0

          # -not -path "*/registry/*"   skips the global Cargo registry cache
          # -not -path "*/.cargo/*"      skips ~/.cargo build artifacts
          # -maxdepth 6                  avoids runaway recursion in deep trees
          while IFS= read -r -d '' cargo_toml; do
            crate_dir="$(dirname "$cargo_toml")"
            found=$((found + 1))
            echo "── Found: $crate_dir"

            if (cd "$crate_dir" && cargo clean 2>&1); then
              echo "   ✓ cargo clean succeeded"
              cleaned=$((cleaned + 1))
            else
              echo "   ✗ cargo clean failed (exit $?)"
              failed=$((failed + 1))
            fi
          done < <(find "$work_root" \
            -maxdepth 6 \
            -name "Cargo.toml" \
            -not -path "*/registry/*" \
            -not -path "*/.cargo/*" \
            -print0 2>/dev/null)

          echo ""
          echo "───────────────────────────────────────"
          echo "Crates found         : $found"
          echo "Successfully cleaned : $cleaned"
          echo "Failed               : $failed"
          echo "───────────────────────────────────────"

          if [[ $failed -gt 0 ]]; then
            echo "::warning title=cargo clean::$failed crate(s) failed to clean on ${{ matrix.runner.name }}"
          fi

          if [[ $found -eq 0 ]]; then
            echo "No Cargo.toml files found under $work_root — nothing to clean."
          fi

      - name: docker system prune
        shell: bash
        run: |
          set -euo pipefail

          echo "Running docker system prune -f on $RUNNER_NAME ..."
          if sudo docker system prune -f 2>&1; then
            echo "✓ docker system prune succeeded"
          else
            echo "::warning title=docker prune::docker system prune failed on ${{ matrix.runner.name }} (exit $?)"
          fi
