# Run lit-action-verify-action-signature.spec.ts.
# Called from Deploy to Phala CVM after wait-for-api, or manually via workflow_dispatch.
#
# ⚠ EXPECTED TO FAIL — verifyActionSignature calls signAsAction internally,
# which is not implemented and has been deprecated.
#
# Slack discussion:
# https://litprotocol.slack.com/archives/C0AG62JLYKS/p1772285399551879?thread_ts=1772254651.978569&cid=C0AG62JLYKS
#
# The workflow run succeeds when k6 fails (expected), and fails when k6 passes
# (unexpected — would mean the underlying signAsAction was accidentally implemented).

name: k6 Lit Action Verify Action Signature

on:
  workflow_call:
    inputs:
      base_url:
        description: "API base URL (e.g. https://example.com/core/v1)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base_url:
        description: "API base URL (optional; uses vars.BASE_URL when empty)"
        required: false
        type: string

jobs:
  k6-lit-action-verify-action-signature:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: lit-action-verify-action-signature.spec.ts (expected to fail)
        env:
          BASE_URL: ${{ inputs.base_url || vars.BASE_URL }}
        run: |
          if k6 run k6/lit-action-verify-action-signature.spec.ts; then
            echo "UNEXPECTED: verifyActionSignature passed — signAsAction should not be implemented"
            exit 1
          else
            echo "OK: verifyActionSignature failed as expected (signAsAction not implemented, deprecated)"
          fi
