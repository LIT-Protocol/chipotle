# Run smoke.spec.ts.
# Called from Deploy to Phala CVM after wait-for-api-restart, or manually via workflow_dispatch.

name: k6 Smoke Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      api_root_url:
        description: "API base URL (e.g. https://example.com/core/v1)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      api_root_url:
        description: "API base URL (optional; uses k6 spec fallback when empty)"
        required: false
        type: string
      accounts_file:
        description: "Optional accounts file override (e.g. ./k6/data/accounts.next.json)"
        required: false
        type: string

jobs:
  k6-smoke:
    runs-on: self-hosted
    env:
      ACCOUNTS_FILE: ${{ inputs.accounts_file || (github.ref_name == 'next' && './data/accounts.next.json' || './data/accounts.dev.json') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: smoke.spec.ts
        env:
          BASE_URL: ${{ inputs.api_root_url }}
          K6_CORRELATION_ID: k6-${{ github.run_id }}-${{ github.run_attempt }}-smoke
        run: k6 run k6/smoke.spec.ts
