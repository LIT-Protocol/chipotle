# Run lit-action-ecdsa-sign.spec.ts.
# Called from Deploy to Phala CVM after wait-for-api, or manually via workflow_dispatch.

name: k6 Lit Action ECDSA Sign

on:
  workflow_call:
    inputs:
      api_root_url:
        description: "API base URL (e.g. https://example.com/core/v1)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      api_root_url:
        description: "API base URL (optional; uses k6 spec fallback when empty)"
        required: false
        type: string

jobs:
  k6-lit-action-ecdsa-sign:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: lit-action-ecdsa-sign.spec.ts
        env:
          BASE_URL: ${{ inputs.api_root_url }}
        run: k6 run k6/correctness/lit-action-ecdsa-sign.spec.ts
