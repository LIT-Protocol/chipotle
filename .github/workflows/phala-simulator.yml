# Phala / dstack simulator validation
#
# Builds the dstack guest-agent from source, runs it as a local simulator,
# and exercises the phala::v1::dstack integration tests against it.
#
# This job gates Phase 1 Workflow A: attestation mechanism (FR-2.5).
# It runs on every push and pull_request so simulator regressions are caught early.
#
# The simulator is the dstack-guest-agent binary from Dstack-TEE/dstack, symlinked
# as dstack-simulator. It creates Unix sockets (dstack.sock, tappd.sock, …) that
# replace /var/run/dstack.sock in non-CVM environments.
# DSTACK_SOCKET is set to the absolute path of dstack.sock so the
# dstack client in dstack.rs transparently uses it instead of the CVM socket.

name: Phala Simulator Validation

on:
  push:
    branches: [main, next]
  pull_request:

concurrency:
  group: phala-simulator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: dstack simulator attestation
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # ── 1. Build the dstack simulator ─────────────────────────────────────
      # note: this is a shared resource for multiple runners on a shared host
      - name: Clone dstack repository
        run: |
          git config --global --add safe.directory /tmp/dstack
          RUNNER_GROUP=runners
          if [ -d /tmp/dstack/.git ]; then
            cd /tmp/dstack && git fetch --depth 1 origin && git reset --hard FETCH_HEAD
          else
            git clone --depth 1 https://github.com/Dstack-TEE/dstack.git /tmp/dstack
            chgrp -R "$RUNNER_GROUP" /tmp/dstack
            chmod -R g+rwx /tmp/dstack
          fi

      # Use stable Rust for the dstack build (it may require features newer than 1.91).
      - name: Install Rust (stable, for dstack)
        uses: dtolnay/rust-toolchain@stable

      - name: Build dstack simulator
        run: cd /tmp/dstack/sdk/simulator && bash build.sh

      # Switch to the pinned toolchain the project declares in rust-toolchain.toml.
      - name: Install Rust 1.91 (lit-api-server toolchain)
        uses: dtolnay/rust-toolchain@1.91

      - name: Install protobuf-compiler
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler && break
            echo "apt lock held, waiting 10s (attempt $i/5)…"
            sleep 10
          done

      # ── 2. Start simulator, run tests, cleanup ──────────────────────────────
      - name: Run phala simulator tests
        run: |
          set -eu
          SIM_DIR=/tmp/dstack/sdk/simulator
          SIM_SOCK="$SIM_DIR/dstack.sock"

          # Clean up any stale simulator from previous runs.
          echo "Cleaning up stale simulator..."
          pkill -f dstack-simulator 2>/dev/null || true
          rm -f "$SIM_SOCK"
          for i in $(seq 1 10); do
            [ ! -S "$SIM_SOCK" ] && break
            echo "  waiting for socket to disappear ($i/10)..."
            sleep 1
          done
          [ ! -S "$SIM_SOCK" ] || { echo "ERROR: stale socket still present"; exit 1; }

          # Start simulator.
          echo "Starting dstack simulator..."
          (cd "$SIM_DIR" && ./dstack-simulator > /tmp/dstack-simulator.log 2>&1) &
          SIM_PID=$!

          # Wait for socket to appear.
          for i in $(seq 1 15); do
            [ -S "$SIM_SOCK" ] && echo "Socket ready." && break
            echo "  waiting for dstack.sock ($i/15)..."
            sleep 1
          done
          [ -S "$SIM_SOCK" ] || { echo "ERROR: dstack.sock never appeared"; cat /tmp/dstack-simulator.log; kill "$SIM_PID" 2>/dev/null || true; exit 1; }

          # Run tests.
          (cd lit-api-server && DSTACK_SOCKET="$SIM_SOCK" cargo test --features phala -- phala::v1::dstack::tests --nocapture)
          STATUS=$?

          # Cleanup: stop simulator and wait for socket to disappear.
          kill "$SIM_PID" 2>/dev/null || true
          for i in $(seq 1 10); do
            [ ! -S "$SIM_SOCK" ] && break
            sleep 1
          done

          exit "$STATUS"
