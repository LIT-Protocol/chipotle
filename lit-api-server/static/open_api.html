<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core V1 API – OpenAPI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    const spec = {
      openapi: "3.0.3",
      info: {
        title: "Lit Node Simple API – Core V1",
        description: "API for /core/v1/ endpoints (accounts, groups, wallets, actions, lit actions).",
        version: "0.1.0"
      },
      servers: [
        { url: "/core/v1", description: "Core V1 API" }
      ],
      paths: {
        "/new_account": {
          post: {
            summary: "Create new account",
            description: "Creates a new account; server generates API key and wallet. Returns api_key and wallet_address.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/NewAccountRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/NewAccountResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/create_wallet/{api_key}": {
          get: {
            summary: "Create wallet",
            description: "Creates a wallet for the given API key. Returns wallet_address.",
            parameters: [
              { name: "api_key", in: "path", required: true, description: "Base64-encoded API key (from new_account)", schema: { type: "string" } }
            ],
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/CreateWalletResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/sign_with_pkp": {
          post: {
            summary: "Sign with PKP",
            description: "Signs a message with the given PKP using the provided API key.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignWithPKPRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/SignWithPkpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/lit_action": {
          post: {
            summary: "Execute lit action",
            description: "Executes a lit action with the given code and optional js_params.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/LitActionRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/LitActionResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/add_group": {
          post: {
            summary: "Add group",
            description: "Add a group to an account. permitted_actions and pkps are keccak256 hashes as hex strings.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/AddGroupRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/add_action_to_group": {
          post: {
            summary: "Add action to group",
            description: "Add an action (IPFS CID) to a group. Optional name and description stored in contract metadata.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/AddActionToGroupRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/add_pkp_to_group": {
          post: {
            summary: "Add PKP to group",
            description: "Add a PKP (public key) to an existing group. pkp_public_key is hashed on server.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/AddPkpToGroupRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/remove_pkp_from_group": {
          post: {
            summary: "Remove PKP from group",
            description: "Remove a PKP from a group. group_id and pkp_public_key must match values used when adding.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/RemovePkpFromGroupRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/add_usage_api_key": {
          post: {
            summary: "Add usage API key",
            description: "Add a usage API key to an account. expiration = unix timestamp, balance = wei (decimal strings).",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/AddUsageApiKeyRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/remove_usage_api_key": {
          post: {
            summary: "Remove usage API key",
            description: "Remove a usage API key from an account.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/RemoveUsageApiKeyRequest" }
                }
              }
            },
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/AccountOpResponse" } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/list_groups": {
          get: {
            summary: "List groups",
            description: "List groups for an account (paginated). Returns id, name, description per group.",
            parameters: [
              { name: "api_key", in: "query", required: true, schema: { type: "string" }, description: "Account API key" },
              { name: "page_number", in: "query", required: true, schema: { type: "string" }, description: "Page number (0-based)" },
              { name: "page_size", in: "query", required: true, schema: { type: "string" }, description: "Page size" }
            ],
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/ListMetadataItem" } } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/list_wallets": {
          get: {
            summary: "List wallets",
            description: "List wallets (wallet derivation metadata) for an account (paginated).",
            parameters: [
              { name: "api_key", in: "query", required: true, schema: { type: "string" }, description: "Account API key" },
              { name: "page_number", in: "query", required: true, schema: { type: "string" }, description: "Page number (0-based)" },
              { name: "page_size", in: "query", required: true, schema: { type: "string" }, description: "Page size" }
            ],
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/ListMetadataItem" } } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/list_wallets_in_group": {
          get: {
            summary: "List wallets in group",
            description: "List wallets in a group (paginated).",
            parameters: [
              { name: "api_key", in: "query", required: true, schema: { type: "string" }, description: "Account API key" },
              { name: "group_id", in: "query", required: true, schema: { type: "string" }, description: "Group ID (decimal or hex)" },
              { name: "page_number", in: "query", required: true, schema: { type: "string" }, description: "Page number (0-based)" },
              { name: "page_size", in: "query", required: true, schema: { type: "string" }, description: "Page size" }
            ],
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/ListMetadataItem" } } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        },
        "/list_actions": {
          get: {
            summary: "List actions",
            description: "List actions in a group (paginated). Returns id, name, description per action.",
            parameters: [
              { name: "api_key", in: "query", required: true, schema: { type: "string" }, description: "Account API key" },
              { name: "group_id", in: "query", required: true, schema: { type: "string" }, description: "Group ID (decimal or hex)" },
              { name: "page_number", in: "query", required: true, schema: { type: "string" }, description: "Page number (0-based)" },
              { name: "page_size", in: "query", required: true, schema: { type: "string" }, description: "Page size" }
            ],
            responses: {
              "200": { description: "OK", content: { "application/json": { schema: { type: "array", items: { $ref: "#/components/schemas/ListMetadataItem" } } } },
              "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } },
              "500": { description: "Internal server error", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrMessage" } } }
            }
          }
        }
      },
      components: {
        schemas: {
          ErrMessage: {
            type: "object",
            description: "Error response body (structure may vary; message string is included)",
            additionalProperties: true
          },
          NewAccountRequest: {
            type: "object",
            required: ["account_name", "account_description"],
            properties: {
              account_name: { type: "string", description: "Name for the account" },
              account_description: { type: "string", description: "Description for the account" }
            }
          },
          NewAccountResponse: {
            type: "object",
            properties: {
              api_key: { type: "string", description: "Generated API key for the new account" },
              wallet_address: { type: "string", description: "Wallet address for the new account" }
            }
          },
          CreateWalletResponse: {
            type: "object",
            properties: {
              wallet_address: { type: "string", description: "Created wallet address" }
            }
          },
          SignWithPKPRequest: {
            type: "object",
            required: ["api_key", "pkp_public_key", "message", "signing_scheme"],
            properties: {
              api_key: { type: "string" },
              pkp_public_key: { type: "string" },
              message: { type: "string" },
              signing_scheme: { type: "string", example: "EcdsaK256Sha256" }
            }
          },
          SignWithPkpResponse: {
            type: "object",
            properties: {
              signing_scheme: { type: "string" },
              signed_digest: { type: "string" },
              public_key: { type: "string" },
              share_type: { $ref: "#/components/schemas/ShareType" },
              big_r: { type: "string", nullable: true },
              compressed_public_key: { type: "string", nullable: true },
              verifying_share: { type: "string", nullable: true },
              signing_commitments: { type: "string", nullable: true },
              shares: { type: "array", items: { $ref: "#/components/schemas/SignatureShare" } }
            }
          },
          ShareType: {
            type: "string",
            enum: ["Ecdsa", "Frost", "Bls"]
          },
          SignatureShare: {
            type: "object",
            properties: {
              share_id: { type: "string" },
              peer_id: { type: "string" },
              signature_share: { type: "string" }
            }
          },
          LitActionRequest: {
            type: "object",
            required: ["api_key", "code"],
            properties: {
              api_key: { type: "string" },
              code: { type: "string", description: "Lit action JavaScript code" },
              js_params: { type: "object", nullable: true, description: "Optional JSON params" }
            }
          },
          LitActionResponse: {
            type: "object",
            properties: {
              signatures: { type: "array", items: { $ref: "#/components/schemas/SignWithPkpResponse" } },
              response: { type: "string" },
              logs: { type: "string" },
              has_error: { type: "boolean" }
            }
          },
          AddGroupRequest: {
            type: "object",
            required: ["api_key", "group_name", "group_description", "permitted_actions", "pkps"],
            properties: {
              api_key: { type: "string" },
              group_name: { type: "string", description: "Name of the group" },
              group_description: { type: "string", description: "Description of the group" },
              permitted_actions: { type: "array", items: { type: "string" }, description: "Keccak256 hashes of action IPFS CIDs (hex)" },
              pkps: { type: "array", items: { type: "string" }, description: "Keccak256 hashes of PKP public keys (hex)" }
            }
          },
          AddActionToGroupRequest: {
            type: "object",
            required: ["api_key", "group_id", "action_ipfs_cid"],
            properties: {
              api_key: { type: "string" },
              group_id: { type: "string", description: "Group ID (decimal or hex)" },
              action_ipfs_cid: { type: "string", description: "IPFS CID for the action" },
              name: { type: "string", nullable: true, description: "Optional name (contract metadata)" },
              description: { type: "string", nullable: true, description: "Optional description (contract metadata)" }
            }
          },
          AddPkpToGroupRequest: {
            type: "object",
            required: ["api_key", "group_id", "pkp_public_key"],
            properties: {
              api_key: { type: "string" },
              group_id: { type: "string" },
              pkp_public_key: { type: "string" }
            }
          },
          RemovePkpFromGroupRequest: {
            type: "object",
            required: ["api_key", "group_id", "pkp_public_key"],
            properties: {
              api_key: { type: "string" },
              group_id: { type: "string" },
              pkp_public_key: { type: "string" }
            }
          },
          AddUsageApiKeyRequest: {
            type: "object",
            required: ["api_key", "usage_api_key", "expiration", "balance"],
            properties: {
              api_key: { type: "string" },
              usage_api_key: { type: "string" },
              expiration: { type: "string", description: "Unix timestamp (decimal string)" },
              balance: { type: "string", description: "Wei (decimal string)" }
            }
          },
          RemoveUsageApiKeyRequest: {
            type: "object",
            required: ["api_key", "usage_api_key"],
            properties: {
              api_key: { type: "string" },
              usage_api_key: { type: "string" }
            }
          },
          AccountOpResponse: {
            type: "object",
            properties: {
              success: { type: "boolean" }
            }
          },
          ListMetadataItem: {
            type: "object",
            description: "One item from list_groups, list_wallets, list_wallets_in_group, or list_actions",
            properties: {
              id: { type: "string" },
              name: { type: "string" },
              description: { type: "string" }
            }
          }
        }
      }
    };

    window.onload = function () {
      window.ui = SwaggerUIBundle({
        spec,
        dom_id: "#swagger-ui",
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>
</html>
